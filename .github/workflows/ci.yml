name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build (ReleaseFast)
        run: zig build -Doptimize=ReleaseFast

      - name: Test
        run: zig build test

      - name: Test (search-stats)
        run: zig build test -Dsearch-stats=true
